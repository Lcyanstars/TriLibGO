name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }} Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows-x64
            os: windows-latest
            qt_version: '6.5.*'
            qt_host: windows
            qt_arch: win64_msvc2019_64
            artifact_name: TriLibGO-1.0.0-Windows-x64
            artifact_ext: zip

          - name: Linux-x64
            os: ubuntu-latest
            qt_version: '6.5.*'
            qt_host: linux
            qt_arch: gcc_64
            artifact_name: TriLibGO-1.0.0-Linux-x64
            artifact_ext: tar.gz

          - name: macOS-ARM64
            os: macos-latest
            qt_version: 'brew'
            qt_host: mac
            qt_arch: arm64
            artifact_name: TriLibGO-1.0.0-macOS-ARM64
            artifact_ext: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgl1-mesa-dev libxkbcommon-dev libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-cursor0 libxcb-util1 \
            libegl1 libfontconfig1 libfreetype6

      - name: Install Qt6 (macOS via Homebrew)
        if: matrix.qt_version == 'brew'
        run: |
          brew install qt@6
          echo "QT_PATH=$(brew --prefix qt@6)" >> "$GITHUB_ENV"

      - name: Install Qt6 (Win/Linux)
        if: matrix.qt_version != 'brew'
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          host: ${{ matrix.qt_host }}
          target: desktop
          arch: ${{ matrix.qt_arch }}
          cache: true

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -DCMAKE_BUILD_TYPE=Release -DTRILIBGO_BUILD_APP=ON -DTRILIBGO_BUILD_TESTS=OFF -DTRILIBGO_ENABLE_ONNXRUNTIME=OFF

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DTRILIBGO_BUILD_APP=ON -DTRILIBGO_BUILD_TESTS=OFF -DTRILIBGO_ENABLE_ONNXRUNTIME=OFF

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_PATH/lib/cmake" \
            -DTRILIBGO_BUILD_APP=ON \
            -DTRILIBGO_BUILD_TESTS=OFF \
            -DTRILIBGO_ENABLE_ONNXRUNTIME=OFF

      - name: Build
        run: cmake --build build --config Release --target trilibgo_app

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = "build/Release/trilibgo_app.exe"
          $staging = "stage/TriLibGO"
          New-Item -ItemType Directory -Force -Path $staging
          Copy-Item $exe $staging
          windeployqt --release --no-translations $staging/trilibgo_app.exe
          Remove-Item "$staging/opengl32sw.dll" -ErrorAction SilentlyContinue
          Compress-Archive -Path $staging -DestinationPath "${{ matrix.artifact_name }}.${{ matrix.artifact_ext }}" -Force

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          staging="stage/TriLibGO"
          mkdir -p "$staging/platforms"

          cp build/trilibgo_app "$staging"

          # Bundle required Qt6 shared libraries
          qt_lib_dir="$(qmake6 -query QT_INSTALL_LIBS)"
          cp -n "$qt_lib_dir/libQt6Core.so.6" \
                "$qt_lib_dir/libQt6Gui.so.6" \
                "$qt_lib_dir/libQt6Widgets.so.6" \
                "$qt_lib_dir/libQt6DBus.so.6" \
                "$qt_lib_dir/libQt6XcbQpa.so.6" \
                "$staging" 2>/dev/null || true

          # Bundle xcb platform plugin (required for display)
          qt_plugins_dir="$(qmake6 -query QT_INSTALL_PLUGINS)"
          cp -n "$qt_plugins_dir/platforms/libqxcb.so" "$staging/platforms" 2>/dev/null || true

          # qt.conf tells Qt where to find plugins relative to the binary
          printf '[Paths]\nPlugins = .\n' > "$staging/qt.conf"

          # Bundle non-standard shared libs needed by binary AND platform plugin
          bundle_non_std_libs() {
            local target="$1"
            local libs
            libs=$(ldd "$target" 2>/dev/null | grep -oP '/\S+\.so\S*' | sort -u || true)
            for lib in $libs; do
              case "$lib" in
                /lib/*|/usr/lib/*|*/libc.so*|*/libm.so*|*/libpthread*|*/libdl.so*|*/librt.so*|*/libstdc++*|*/libgcc_s*)
                  ;; # standard libs, skip
                *)
                  cp -n "$lib" "$staging" 2>/dev/null || true
                  ;;
              esac
            done
          }

          bundle_non_std_libs "$staging/trilibgo_app"
          bundle_non_std_libs "$staging/platforms/libqxcb.so"

          # Extra deps that dlopen / runtime-load might miss (Qt6 xcb backend requirements)
          for extra in libxcb-cursor.so.0 libxcb-icccm.so.4 libxcb-image.so.0 \
                      libxcb-keysyms.so.1 libxcb-randr.so.0 libxcb-render-util.so.0 \
                      libxcb-shape.so.0 libxcb-shm.so.0 libxcb-sync.so.1 \
                      libxcb-xfixes.so.0 libxcb-xinerama.so.0 libxcb-xkb.so.1 \
                      libxcb.so.1 libxcb-util.so.1 libxkbcommon.so.0 libxkbcommon-x11.so.0 \
                      libOpenGL.so.0 libGL.so.1 libEGL.so.1 \
                      libfontconfig.so.1 libfreetype.so.6; do
            find /usr/lib -name "$extra" -print -quit 2>/dev/null | while read -r f; do
              cp -n "$f" "$staging" 2>/dev/null || true
            done
          done

          # Create launcher script
          cat > "$staging/TriLibGO.sh" << 'LAUNCHER'
          #!/bin/sh
          DIR="$(cd "$(dirname "$0")" && pwd)"
          export LD_LIBRARY_PATH="$DIR${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          exec "$DIR/trilibgo_app" "$@"
          LAUNCHER
          chmod +x "$staging/TriLibGO.sh"
          tar -czf "${{ matrix.artifact_name }}.${{ matrix.artifact_ext }}" -C stage TriLibGO

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          app="stage/TriLibGO.app"
          mkdir -p "$app/Contents/MacOS" "$app/Contents/Frameworks" "$app/Contents/PlugIns/platforms"

          cat > "$app/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>trilibgo_app</string>
              <key>CFBundleIdentifier</key>
              <string>com.trilibgo.app</string>
              <key>CFBundleName</key>
              <string>TriLibGO</string>
              <key>CFBundleVersion</key>
              <string>1.0.0</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          PLIST

          cp build/trilibgo_app "$app/Contents/MacOS"

          QT_PREFIX="$(brew --prefix qt@6)"
          BIN="$app/Contents/MacOS/trilibgo_app"
          FW="$app/Contents/Frameworks"

          echo "=== Binary deps ==="
          otool -L "$BIN"
          echo "=== Qt prefix contents (lib) ==="
          ls "$QT_PREFIX/lib" | head -30

          # Copy all Qt .dylib files that the binary references (brew Qt uses flat dylibs)
          mkdir -p "$FW"
          for dylib in "$QT_PREFIX"/lib/libQt6*.dylib; do
            [ -f "$dylib" ] || continue
            name=$(basename "$dylib")
            if otool -L "$BIN" | grep -q "$name"; then
              echo "Copying $name"
              cp -n "$dylib" "$FW"
            fi
          done

          # Copy platform plugin
          mkdir -p "$app/Contents/PlugIns/platforms"
          echo "=== Qt plugins dir ==="
          ls "$QT_PREFIX/plugins/platforms/" 2>/dev/null || echo "(no platforms dir)"
          cp "$QT_PREFIX/plugins/platforms/libqcocoa.dylib" "$app/Contents/PlugIns/platforms"

          # Helper: find old install name for a given dylib basename (handles full paths and @rpath)
          find_old_path() {
            local target="$1" dylib_name="$2"
            local old
            old=$(otool -L "$target" | grep -oE "/[^ ]*${dylib_name}" | head -1)
            if [ -n "$old" ]; then
              echo "$old"
            else
              otool -L "$target" | grep -oE "@rpath/${dylib_name}" | head -1
            fi
          }

          # Rewrite binary's install names from brew paths to bundled paths
          for dylib in "$FW"/*.dylib; do
            [ -f "$dylib" ] || continue
            name=$(basename "$dylib")
            old_path=$(find_old_path "$BIN" "$name")
            if [ -n "$old_path" ]; then
              echo "Rewriting binary ref $name: $old_path -> @executable_path/../Frameworks/$name"
              install_name_tool -change "$old_path" "@executable_path/../Frameworks/$name" "$BIN"
            fi
          done

          # Rewrite dylib-to-dylib references and each dylib's own install name
          for dylib in "$FW"/*.dylib; do
            [ -f "$dylib" ] || continue
            name=$(basename "$dylib")
            # Fix the dylib's own install name
            install_name_tool -id "@executable_path/../Frameworks/$name" "$dylib"
            # Fix references to other bundled dylibs
            for other in "$FW"/*.dylib; do
              [ -f "$other" ] || continue
              other_name=$(basename "$other")
              [ "$name" = "$other_name" ] && continue
              old_path=$(find_old_path "$dylib" "$other_name")
              if [ -n "$old_path" ] && [ "$old_path" != "@executable_path/../Frameworks/$other_name" ]; then
                echo "Rewriting $name -> $other_name: $old_path -> @executable_path/../Frameworks/$other_name"
                install_name_tool -change "$old_path" "@executable_path/../Frameworks/$other_name" "$dylib"
              fi
            done
          done

          echo "=== Final state ==="
          du -sh "$app"
          echo "=== Contents ==="
          find "$app" -type f -ls | head -50

          tar -czf "${{ matrix.artifact_name }}.${{ matrix.artifact_ext }}" -C stage TriLibGO.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.${{ matrix.artifact_ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List artifacts
        run: ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "TriLibGO 1.0.0"
          body: |
            ## TriLibGO 1.0.0

            Initial release of the TriLibGO desktop application.

            **TriLibGO** is an original Go variant played on the vertices of a hexagonal board.
            Interior stones have three liberties instead of four, creating a faster, sharper
            capture dynamic.

            ### System Requirements

            - **Windows**: Windows 10+, x64
            - **Linux**: Ubuntu 22.04+ or equivalent, x64 (Qt 6 libraries bundled)
            - **macOS**: macOS 13+, Apple Silicon (ARM64)

            ### How to Run

            **Windows**: Extract the zip and run `TriLibGO/trilibgo_app.exe`

            **Linux**: Extract the tar.gz and run `TriLibGO/TriLibGO.sh` (bundles required Qt 6 libraries)

            **macOS**: Extract the tar.gz and run `TriLibGO.app` (right-click → Open if Gatekeeper blocks)

            ### Features

            - Hexagonal board topology (configurable side length 2–12)
            - Two-player local play with pass, undo, and Chinese area scoring
            - Self-play trace visualization (JSONL)
            - Game record save/load (TGO, JSONL formats)
            - ONNX model analysis overlay (load your own models)
          draft: false
          prerelease: false
          files: |
            release-assets/*
