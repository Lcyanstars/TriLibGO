<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">TriLibGO Logo</title>
  <desc id="desc">A geometric TriLibGO logo with triangular Go topology, black and white stones, and three liberty points.</desc>
  <defs>
    <linearGradient id="bg" x1="128" y1="64" x2="896" y2="960" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10251f"/>
      <stop offset="0.54" stop-color="#173b32"/>
      <stop offset="1" stop-color="#d69a3a"/>
    </linearGradient>
    <linearGradient id="board" x1="246" y1="210" x2="780" y2="726" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f5c76f"/>
      <stop offset="1" stop-color="#a95f26"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#07100d" flood-opacity="0.42"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="184" fill="url(#bg)"/>
  <path d="M168 814 512 118l344 696H168Z" fill="#081611" opacity="0.28"/>

  <g filter="url(#shadow)">
    <path d="M512 168 814 776H210L512 168Z" fill="url(#board)" stroke="#ffe1a0" stroke-width="18" stroke-linejoin="round"/>
    <path d="M512 274 704 670H320L512 274Z" fill="none" stroke="#51351f" stroke-width="10" stroke-linejoin="round" opacity="0.8"/>
    <path d="M512 168v608M210 776 704 670M814 776 320 670M320 670 512 274 704 670" fill="none" stroke="#51351f" stroke-width="9" stroke-linecap="round" opacity="0.72"/>
    <path d="M362 472h300M282 616h460M402 552h220" fill="none" stroke="#51351f" stroke-width="7" stroke-linecap="round" opacity="0.55"/>
  </g>

  <g filter="url(#shadow)">
    <circle cx="512" cy="486" r="70" fill="#10120f" stroke="#2b3129" stroke-width="8"/>
    <circle cx="512" cy="486" r="47" fill="#060706"/>
    <circle cx="404" cy="620" r="58" fill="#f4efe3" stroke="#fff8e8" stroke-width="8"/>
    <circle cx="404" cy="620" r="34" fill="#d8d0bf" opacity="0.55"/>
    <circle cx="620" cy="620" r="58" fill="#10120f" stroke="#2b3129" stroke-width="8"/>
    <circle cx="620" cy="620" r="37" fill="#060706"/>
  </g>

  <g filter="url(#glow)">
    <circle cx="512" cy="330" r="18" fill="#58f2b6"/>
    <circle cx="326" cy="732" r="18" fill="#58f2b6"/>
    <circle cx="698" cy="732" r="18" fill="#58f2b6"/>
  </g>

  <text x="512" y="898" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="86" font-weight="700" letter-spacing="3"
        fill="#fff1cf">TriLibGO</text>
  <text x="512" y="948" text-anchor="middle"
        font-family="Verdana, sans-serif"
        font-size="28" letter-spacing="9"
        fill="#c8f9df" opacity="0.9">THREE LIBERTIES GO</text>
</svg>
